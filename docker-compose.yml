services:
  redis:
    image: redis:7-alpine
    container_name: agentos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis.conf:/etc/redis/redis.conf
    command: redis-server /etc/redis/redis.conf
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: agentos_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

